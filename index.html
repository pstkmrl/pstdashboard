<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMRL SUBSTATION DASHBOARD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap');

        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --accent-blue: #58a6ff;
            --accent-green: #00ff41;
            --accent-red: #ff4444;
            --accent-orange: #ffae42;
            --accent-purple: #df00ff;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --ash-bg: #21262d;
            --ash-text: #8b949e;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 8px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        @media (max-width: 1024px) {
            body { height: auto; overflow-y: auto; overflow-x: hidden; padding-bottom: 120px; }
        }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel-bg);
            padding: 0 20px;
            border-bottom: 2px solid var(--accent-blue);
            height: 80px;
            margin-bottom: 8px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
            flex-shrink: 0;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 50;
            position: absolute;
            left: 0;
            padding-left: 20px;
            height: 100%;
            background: var(--panel-bg);
        }

        .logo-section img {
            height: 50px;
            filter: drop-shadow(0 0 5px rgba(88, 166, 255, 0.4));
        }

        .checklist-container {
            position: absolute;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }

        .checklist-marquee {
            white-space: nowrap;
            font-family: 'Orbitron';
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-red);
            animation: scroll-text 30s linear infinite;
        }

        @keyframes scroll-text {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        .clock-container {
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 60;
            background: var(--panel-bg);
            padding: 0 10px;
        }

        .clock-unit {
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            min-width: 70px;
            text-align: center;
            position: relative;
        }

        .clock-val {
            font-family: 'Orbitron';
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--accent-green);
            line-height: 1;
            text-shadow: 0 0 10px rgba(0,255,65,0.5);
        }

        .clock-label {
            font-size: 0.6rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .top-controls {
            position: absolute;
            right: 0;
            padding-right: 20px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
            background: var(--panel-bg);
        }

        .btn-control {
            background: linear-gradient(180deg, #2d333b 0%, #161b22 100%);
            color: var(--accent-blue);
            border: 1px solid #444c56;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #0b0e14, 0 6px 10px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }

        .btn-control:active { transform: translateY(3px); box-shadow: 0 1px 0 #0b0e14; }
        .btn-off { color: var(--accent-red); border-color: #6e2a2a; background: linear-gradient(180deg, #442a2a 0%, #2a1616 100%); }
        .btn-grid-active { background: linear-gradient(180deg, #1a2027 0%, #0d1117 100%); box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); transform: translateY(3px) !important; color: var(--text-dim); }

        /* --- STANDBY / BLACKOUT --- */
        #blackout {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .analog-clock {
            width: 60vh;
            height: 60vh;
            border: 15px solid #1a1a1a;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, #111, #000);
        }

        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 5px; }
        .h-hr { width: 8px; height: 25%; background: #fff; transform: translateX(-50%); }
        .h-min { width: 6px; height: 35%; background: #bbb; transform: translateX(-50%); }
        .h-sec { width: 2px; height: 42%; background: var(--accent-red); transform: translateX(-50%); }

        /* --- STATION GRID --- */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 6px;
            margin-bottom: 8px;
            padding: 5px;
            flex-shrink: 0;
        }

        .station-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-blue);
            border-radius: 6px;
            padding: 4px 2px;
            text-align: center;
        }

        .card-alarm { border-top-color: var(--accent-red) !important; }
        .st-name { font-weight: 900; font-size: 0.72rem; color: #ffffff; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .st-date { font-size: 0.55rem; color: var(--accent-blue); display: block; margin-bottom: 4px; }
        .st-data-row { display: flex; justify-content: space-around; border-top: 1px solid var(--border-color); padding-top: 4px; font-size: 0.68rem; font-weight: 700; }
        .temp-safe { color: var(--accent-green); }
        .temp-warn { color: var(--accent-red); }

        /* --- ROSTER --- */
        .roster-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
        .roster-container { display: flex; flex-direction: column; gap: 6px; }
        .section-title { background: #1c2128; border: 1px solid var(--accent-orange); color: var(--accent-orange); text-align: center; font-weight: 900; font-size: 0.9rem; padding: 5px; border-radius: 4px; text-transform: uppercase; }
        .shift-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .shift-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px 8px; min-height: 145px; display: flex; flex-direction: column; }
        .shift-active { border: 2px solid var(--accent-green); box-shadow: inset 0 0 15px rgba(0,255,65,0.1); }
        .shift-label { color: var(--accent-blue); font-weight: 900; font-size: 0.75rem; border-bottom: 1px solid #333; margin-bottom: 8px; text-align: center; }
        .staff-entry { display: flex; justify-content: space-between; font-size: 0.75rem; color: #aff5b4; margin-bottom: 6px; }
        .duty-badge { font-size: 0.65rem; padding: 1px 4px; border: 1px solid; border-radius: 3px; }
        .badge-tpc-m { color: #00d4ff; border-color: #00d4ff; }
        .badge-tpc-e { color: #ff9100; border-color: #ff9100; }
        .badge-tpc-n { color: var(--accent-purple); border-color: var(--accent-purple); }

        /* --- MAINTENANCE --- */
        .bottom-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 12px;
            flex-grow: 1;
            margin-bottom: 50px;
            min-height: 0;
        }

        .maint-wrap {
            background: rgba(22, 27, 34, 0.6);
            border: 1px dashed var(--accent-orange);
            border-radius: 8px;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .maint-title {
            background: #1c2128;
            padding: 8px;
            border-bottom: 1px solid var(--accent-orange);
            color: var(--accent-orange);
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .maint-scroll-viewport {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        #maint-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sch-item {
            font-size: 0.95rem;
            padding: 10px 15px;
            border-left: 4px solid var(--accent-orange);
            background: rgba(255, 174, 66, 0.08);
            color: var(--text-main);
            font-weight: 600;
        }

        .status-blocks { display: flex; flex-direction: column; gap: 10px; }
        .ops-static-box { width: 100%; height: 45px; background: var(--panel-bg); border: 2px solid var(--accent-blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; }
        .ops-static-box.alert { border-color: var(--accent-red); color: var(--accent-red); }
        .ops-static-box.ok { border-color: var(--accent-green); color: var(--accent-green); }

        /* --- DRIVER --- */
        .driver-overlay { position: fixed; bottom: 53px; left: 8px; background: var(--panel-bg); border: 2px solid var(--accent-blue); border-left: 6px solid var(--accent-green); padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; z-index: 1000; }
        .driver-overlay.outdated { opacity: 0.6; border-color: var(--accent-red); border-left-color: var(--accent-red); }
        .driver-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--accent-blue); object-fit: cover; }
        .driver-badge { background: var(--accent-orange); color: black; font-size: 0.6rem; font-weight: 900; padding: 1px 5px; border-radius: 3px; display: inline-block; }
        .driver-time-badge { background: #2d333b; color: var(--accent-blue); font-size: 0.55rem; padding: 1px 5px; border-radius: 3px; margin-top: 4px; display: inline-block; }
        #driver-phone { color: var(--accent-green); font-size: 0.95rem; font-weight: 700; margin-top: 2px; }
        #outdated-warning { display: none; color: var(--accent-red); font-weight: 900; font-size: 0.65rem; animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .outdated #outdated-warning { display: block; }

        /* --- TICKER --- */
        .ticker-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 45px; background: var(--panel-bg); border-top: 2px solid var(--accent-blue); display: flex; align-items: center; z-index: 1001; }
        .ticker-head { background: var(--accent-blue); color: #000; padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: 900; font-size: 0.8rem; }
        .ticker-body { flex-grow: 1; overflow: hidden; }
        .ticker-scroll { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker-move 40s linear infinite; font-size: 1.1rem; font-weight: 900; color: var(--accent-green); }
        @keyframes ticker-move { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .gear-icon { width: 18px; height: 18px; fill: var(--accent-orange); animation: gear-rotate 4s linear infinite; }
        @keyframes gear-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="wakeUp()">

    <div id="blackout">
        <div class="analog-clock">
            <div id="ana-h" class="hand h-hr"></div>
            <div id="ana-m" class="hand h-min"></div>
            <div id="ana-s" class="hand h-sec"></div>
        </div>
    </div>

    <header class="top-bar">
        <div class="logo-section">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/74/Kochi_Metro_logo.png" alt="KMRL">
        </div>
        <div id="checklist-container" class="checklist-container" style="display: none;">
            <div id="checklist-text" class="checklist-marquee">CONNECTING TO DATA SOURCE...</div>
        </div>
        <div id="clock-container" class="clock-container" style="display: none;">
            <div class="clock-unit"><div id="clk-h" class="clock-val">00</div><div class="clock-label">Hours</div></div>
            <div class="clock-unit"><div id="clk-m" class="clock-val">00</div><div class="clock-label">Min</div></div>
            <div class="clock-unit"><div id="clk-s" class="clock-val">00</div><div class="clock-label">Sec</div></div>
        </div>
        <div class="top-controls">
            <button id="btn-grid" class="btn-control btn-grid-active" onclick="toggleGrid(event)">GRID</button>
            <button class="btn-control" onclick="goFullscreen(event)">FS</button>
            <button class="btn-control btn-off" onclick="manualOff(event)">OFF</button>
        </div>
    </header>

    <main id="station-grid" class="station-grid" style="display: none;"></main>

    <section class="roster-section">
        <div class="roster-container"><div class="section-title">Today's Deployment</div><div id="roster-today" class="shift-cards"></div></div>
        <div class="roster-container"><div class="section-title">Tomorrow's Deployment</div><div id="roster-tomorrow" class="shift-cards"></div></div>
    </section>

    <section class="bottom-layout">
        <div class="maint-wrap">
            <div class="maint-title">
                <svg class="gear-icon" viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.35 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.34 14.86,5.08L14.47,2.44C14.44,2.21 14.25,2 14,2H10C9.75,2 9.56,2.21 9.53,2.44L9.14,5.08C8.53,5.34 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.22,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.35 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.22,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.04 4.95,18.95L7.44,17.95C7.96,18.34 8.53,18.66 9.14,18.92L9.53,21.56C9.56,21.79 9.75,22 10,22H14C14.25,22 14.44,21.79 14.47,21.56L14.86,18.92C15.47,18.66 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" /></svg>
                UPCOMING MAINTENANCE SCHEDULE
            </div>
            <div class="maint-scroll-viewport"><div id="maint-list"></div></div>
        </div>
        <div class="status-blocks">
            <div id="box-mainline" class="ops-static-box">MAINLINE: ---</div>
            <div id="box-depot" class="ops-static-box">DEPOT: ---</div>
        </div>
    </section>

    <div id="driver-card" class="driver-overlay">
        <img id="driver-img" src="https://cdn-icons-png.flaticon.com/512/6596/6596121.png" class="driver-img" onclick="initiateCall(event)">
        <div>
            <div id="driver-shift" class="driver-badge">SHIFT: ---</div>
            <div id="driver-name" style="font-weight:900; color:white; font-size:1rem; margin:2px 0;">Loading...</div>
            <div id="driver-phone">---</div>
            <div id="driver-update-time" class="driver-time-badge">Updated: ---</div>
            <div id="outdated-warning">OUTDATED DATA</div>
        </div>
    </div>

    <footer class="ticker-bar">
        <div id="ticker-head" class="ticker-head">TECH (0)</div>
        <div class="ticker-body"><div id="ticker-text" class="ticker-scroll">FETCHING DATA...</div></div>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyddUSOQ5nUubR9VBLWgPRJKYrkONJ6LnGxJ6yztzQbPt4VwdNVmyN-7g-9NW8zpdK5xg/exec";
        
        function goFullscreen(e) { if(e) e.stopPropagation(); if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function manualOff(e) { if(e) e.stopPropagation(); document.getElementById('blackout').style.display = 'flex'; }
        function wakeUp() { document.getElementById('blackout').style.display = 'none'; }
        function initiateCall(e) { e.stopPropagation(); const ph = document.getElementById('driver-phone').innerText; if(ph && ph !== "---") window.location.href=`tel:${ph.replace(/\D/g,'')}`; }

        function toggleGrid(e) {
            if(e) e.stopPropagation();
            const g = document.getElementById('station-grid'), c = document.getElementById('checklist-container'), cl = document.getElementById('clock-container'), b = document.getElementById('btn-grid');
            const show = g.style.display === 'none';
            g.style.display = show ? 'grid' : 'none';
            c.style.display = show ? 'flex' : 'none';
            cl.style.display = show ? 'flex' : 'none';
            show ? b.classList.remove('btn-grid-active') : b.classList.add('btn-grid-active');
        }

        function parseStaff(raw) {
            if(!raw) return '';
            return raw.split('\n').map(line => {
                if(line.includes('|')) {
                    const [n, d] = line.split('|');
                    const dc = d.trim().toUpperCase();
                    const bc = dc.includes('M TPC') ? 'badge-tpc-m' : dc.includes('E TPC') ? 'badge-tpc-e' : dc.includes('N TPC') ? 'badge-tpc-n' : '';
                    return `<div class="staff-entry"><span>${n}</span><span class="duty-badge ${bc}">${d}</span></div>`;
                }
                return `<div class="staff-entry"><span>${line}</span></div>`;
            }).join('');
        }

        window.draw = function(data) {
            let stH = '', tdH = '', tmH = '', updateTimeStr = '';
            
            data.forEach(i => { if(i.Unit === "sheetab" && i.Parameter === "sheetab_R2C1") updateTimeStr = i.Value; });

            data.forEach(item => {
                const u = item.Unit, p = item.Parameter, v = item.Value;
                if(p === "ChecklistStatus") {
                    const el = document.getElementById('checklist-text');
                    el.innerText = `MTRS DAILY CHECKLIST: ${v}`;
                    el.style.color = v.toUpperCase() === "FULLY FILLED" ? "var(--accent-green)" : "var(--accent-red)";
                }
                if(u === "StationTemp") {
                    const pts = v.split("|"), a = parseFloat(pts[0])||0, t = parseFloat(pts[1])||0;
                    stH += `<div class="station-card ${a>34||t>80?'card-alarm':''}"><span class="st-name">${p}</span><span class="st-date">${pts[2]||'--:--'}</span><div class="st-data-row"><span class="${a>34?'temp-warn':'temp-safe'}">A:${pts[0]}°</span><span class="${t>80?'temp-warn':'temp-safe'}">T:${pts[1]}°</span></div></div>`;
                }
                if(u === "Staff-Today") tdH += `<div class="shift-card ${item.Limit==='ACTIVE'?'shift-active':''}"><span class="shift-label">${p}</span>${parseStaff(v)}</div>`;
                if(u === "Staff-Tomorrow") tmH += `<div class="shift-card"><span class="shift-label">${p}</span>${parseStaff(v)}</div>`;
                if(u === "OpsBlock") {
                    const [m, d] = v.split('|'), mEl = document.getElementById('box-mainline'), dEl = document.getElementById('box-depot');
                    mEl.innerText = `MAINLINE: ${m||'---'}`; dEl.innerText = `DEPOT: ${d||'---'}`;
                    mEl.className = `ops-static-box ${m.includes('ENERGISED')?'alert':m.includes('IB')?'ok':''}`;
                    dEl.className = `ops-static-box ${d.includes('ENERGISED')?'alert':d.includes('IB')?'ok':''}`;
                }
                if(p === "UPCOMING_SCHEDULE") {
                    const lines = v.split('\n').filter(l => l.trim().length > 0);
                    document.getElementById('maint-list').innerHTML = lines.map(l => `<div class="sch-item">${l}</div>`).join('');
                }
                if(u === "TechTicker") {
                    const [h, b] = v.split('|');
                    document.getElementById('ticker-head').innerText = h || "TECH";
                    document.getElementById('ticker-text').innerText = b || "---";
                }
                if(u === "DriverPopup" || u === "Technician") {
                    const [n, ph, sh, img] = v.split('|'), card = document.getElementById('driver-card'), nameEl = document.getElementById('driver-name');
                    const isUp = n && !['N/A','PENDING',''].includes(n.trim().toUpperCase());
                    
                    const now = new Date(), last = new Date(updateTimeStr);
                    let fresh = false;
                    if(!isNaN(last.getTime())){
                        const lh = last.getHours(), ld = last.toDateString(), ch = now.getHours(), cd = now.toDateString();
                        if(ch >= 8 && ch < 20) { if(ld === cd && lh >= 8 && lh < 20) fresh = true; }
                        else {
                            if(ch >= 20) { if(ld === cd && lh >= 20) fresh = true; }
                            else { const y = new Date(); y.setDate(y.getDate()-1); if((ld === cd && lh < 8) || (ld === y.toDateString() && lh >= 20)) fresh = true; }
                        }
                    }

                    if(!isUp || !fresh) card.classList.add('outdated'); else card.classList.remove('outdated');
                    nameEl.innerText = isUp ? n : "NOT UPDATED";
                    document.getElementById('driver-phone').innerText = isUp ? (ph || '---') : '---';
                    document.getElementById('driver-shift').innerText = 'SHIFT: ' + (isUp ? (sh || '---') : '---');
                    document.getElementById('driver-img').src = (isUp && img && img.startsWith('http')) ? img : "https://cdn-icons-png.flaticon.com/512/6596/6596121.png";
                    if(updateTimeStr) document.getElementById('driver-update-time').innerText = `Updated: ${new Date(updateTimeStr).toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}`;
                }
            });
            document.getElementById('station-grid').innerHTML = stH;
            document.getElementById('roster-today').innerHTML = tdH;
            document.getElementById('roster-tomorrow').innerHTML = tmH;
        };

        function updateClocks() {
            const n = new Date(), s = n.getSeconds(), m = n.getMinutes(), h = n.getHours();
            document.getElementById('clk-h').innerText = String(h).padStart(2,'0');
            document.getElementById('clk-m').innerText = String(m).padStart(2,'0');
            document.getElementById('clk-s').innerText = String(s).padStart(2,'0');
            document.getElementById('ana-s').style.transform = `translateX(-50%) rotate(${s*6}deg)`;
            document.getElementById('ana-m').style.transform = `translateX(-50%) rotate(${m*6}deg)`;
            document.getElementById('ana-h').style.transform = `translateX(-50%) rotate(${h*30+m*0.5}deg)`;
        }
        setInterval(updateClocks, 1000); updateClocks();

        function refreshData() {
            const old = document.getElementById('api-script'); if(old) old.remove();
            const s = document.createElement('script'); s.id = 'api-script'; s.src = `${API_URL}?callback=draw&_t=${Date.now()}`;
            document.body.appendChild(s);
        }
        refreshData(); setInterval(refreshData, 15000);
    </script>
</body>
</html>
