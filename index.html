<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMRL SUBSTATION DASHBOARD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;700&display=swap');

        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --panel-glass: rgba(22, 27, 34, 0.8);
            --accent-blue: #58a6ff;
            --accent-green: #00ff41;
            --accent-red: #ff4444;
            --accent-orange: #ffae42;
            --accent-purple: #df00ff;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --ash-bg: #21262d;
            --ash-text: #8b949e;
            --shadow-neon: 0 0 15px rgba(88, 166, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        @media (max-width: 1024px) {
            body { height: auto; overflow-y: auto; padding-bottom: 140px; }
        }

        /* Custom Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; border: 1px solid rgba(88, 166, 255, 0.1); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-bg);
            padding: 0 20px;
            border-bottom: 2px solid var(--accent-blue);
            height: 70px;
            margin-bottom: 10px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
            flex-shrink: 0;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .top-bar { flex-direction: column; height: auto; padding: 10px; gap: 10px; }
        }

        .logo-section img {
            height: 45px;
            filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.4));
        }

        .checklist-container {
            flex-grow: 1;
            margin: 0 40px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            height: 40px;
            display: flex;
            align-items: center;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .checklist-marquee {
            white-space: nowrap;
            font-family: 'Orbitron';
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent-red);
            position: absolute;
            animation: scroll-text 25s linear infinite;
        }

        @keyframes scroll-text {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .clock-container { display: flex; gap: 5px; align-items: center; }
        .clock-unit { background: #000; border: 1px solid var(--border-color); border-radius: 4px; padding: 4px 8px; min-width: 55px; text-align: center; }
        .clock-val { font-family: 'Orbitron'; font-size: 1.4rem; font-weight: 900; color: var(--accent-green); line-height: 1; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
        .clock-label { font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; }

        .top-controls { display: flex; gap: 8px; }
        .btn-control {
            background: linear-gradient(180deg, #2d333b 0%, #161b22 100%);
            color: var(--accent-blue);
            border: 1px solid #444c56;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            font-weight: 700;
            box-shadow: 0 3px 0 #0b0e14;
            transition: all 0.1s ease;
        }
        .btn-control:active { transform: translateY(2px); box-shadow: 0 1px 0 #0b0e14; }
        .btn-grid-active { background: #58a6ff; color: #000; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .btn-off { color: var(--accent-red); border-color: #6e2a2a; }

        /* --- STATION GRID --- */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
            transition: opacity 0.3s ease;
        }

        .station-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-blue);
            border-radius: 6px;
            padding: 8px 4px;
            text-align: center;
            position: relative;
        }

        .station-card.card-alarm { 
            border-top-color: var(--accent-red); 
            background: rgba(255, 68, 68, 0.05);
            animation: card-pulse 1s infinite alternate;
        }

        @keyframes card-pulse { from { box-shadow: 0 0 5px rgba(255,68,68,0.2); } to { box-shadow: 0 0 15px rgba(255,68,68,0.4); } }
        .st-name { font-weight: 700; font-size: 0.75rem; color: #fff; display: block; margin-bottom: 4px; }
        .st-date { font-size: 0.6rem; color: var(--text-dim); display: block; margin-bottom: 6px; }
        .st-data-row { display: flex; justify-content: space-around; border-top: 1px solid var(--border-color); padding-top: 6px; font-size: 0.7rem; font-family: 'Orbitron'; }
        .temp-safe { color: var(--accent-green); }
        .temp-warn { color: var(--accent-red); font-weight: 900; }

        /* --- ROSTER SECTION --- */
        .roster-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        @media (max-width: 1024px) { .roster-section { grid-template-columns: 1fr; } }
        .roster-container { display: flex; flex-direction: column; gap: 8px; }
        .section-title { background: #1c2128; border: 1px solid var(--accent-orange); color: var(--accent-orange); text-align: center; font-weight: 800; font-size: 0.85rem; padding: 6px; border-radius: 4px; text-transform: uppercase; }
        .shift-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .shift-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; min-height: 120px; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .shift-active { border: 1px solid var(--accent-green); box-shadow: 0 0 10px rgba(0,255,65,0.1); }
        .shift-label { color: var(--accent-blue); font-weight: 700; font-size: 0.8rem; text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .staff-entry { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 6px; color: #aff5b4; }
        .duty-badge { font-size: 0.6rem; padding: 1px 4px; border: 1px solid; border-radius: 3px; }
        .badge-tpc-m { color: #00d4ff; border-color: #00d4ff; }
        .badge-tpc-e { color: #ff9100; border-color: #ff9100; }
        .badge-tpc-n { color: var(--accent-purple); border-color: var(--accent-purple); }

        /* --- BOTTOM LAYOUT --- */
        .bottom-layout { display: grid; grid-template-columns: 1fr 300px; gap: 12px; flex-grow: 1; overflow: hidden; margin-bottom: 55px; min-height: 0; }
        @media (max-width: 1024px) { .bottom-layout { grid-template-columns: 1fr; overflow: visible; height: 600px; } }
        
        .maint-wrap { 
            background: var(--panel-glass); 
            border: 1px dashed var(--accent-orange); 
            border-radius: 8px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .maint-title { 
            color: var(--accent-orange); 
            font-weight: 800; 
            font-size: 0.8rem; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-shrink: 0;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 174, 66, 0.2);
        }
        
        .maint-list { 
            overflow-y: auto; 
            flex-grow: 1;
            padding-right: 8px;
            scrollbar-gutter: stable;
        }
        
        .sch-item { 
            font-size: 0.85rem; 
            padding: 12px; 
            border-left: 4px solid var(--accent-orange); 
            background: rgba(255, 174, 66, 0.05); 
            margin-bottom: 10px; 
            font-weight: 600; 
            border-radius: 0 4px 4px 0;
            transition: background 0.2s ease;
        }
        .sch-item:hover { background: rgba(255, 174, 66, 0.1); }

        .status-blocks { display: flex; flex-direction: column; gap: 8px; }
        .ops-static-box { padding: 15px; background: #000; border: 1px solid var(--accent-blue); border-radius: 6px; text-align: center; font-family: 'Orbitron'; font-size: 0.9rem; font-weight: 700; }
        .ops-static-box.alert { border-color: var(--accent-red); color: var(--accent-red); }
        .ops-static-box.ok { border-color: var(--accent-green); color: var(--accent-green); }

        /* Notice Board */
        .notice-board {
            flex-grow: 1;
            background: rgba(88, 166, 255, 0.03);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 10px rgba(88, 166, 255, 0.1);
            overflow: hidden;
        }
        .notice-title {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: var(--accent-blue);
            font-weight: 800;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(88, 166, 255, 0.2);
            padding-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        .notice-content-wrapper {
            flex-grow: 1;
            overflow: hidden; /* This hides the scrollbar and clips the content for the auto-scroll effect */
            position: relative;
        }
        .notice-content {
            font-size: 0.85rem;
            color: #d1d9e1;
            line-height: 1.4;
            font-style: italic;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: transform 0.1s linear;
        }

        /* --- DRIVER CARD --- */
        .driver-overlay { position: fixed; bottom: 60px; left: 15px; background: var(--panel-bg); border: 2px solid var(--accent-blue); border-left-width: 8px; border-left-color: var(--accent-green); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .driver-card-outdated { opacity: 0.4; filter: grayscale(0.5); border-left-color: var(--accent-red) !important; }
        .driver-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent-blue); object-fit: cover; cursor: pointer; }
        .driver-name { font-weight: 800; font-size: 1rem; color: #fff; }
        .driver-phone { color: var(--accent-green); font-weight: 700; font-family: 'Orbitron'; font-size: 0.9rem; margin-top: 4px; }
        .driver-update-badge { font-size: 0.6rem; margin-top: 6px; padding: 2px 6px; border-radius: 4px; display: inline-block; font-family: 'Inter'; font-weight: 600; border: 1px solid; }
        .outdated-warning { position: absolute; top: -12px; right: 10px; background: var(--accent-red); color: #fff; font-size: 0.6rem; font-weight: 900; padding: 2px 8px; border-radius: 10px; animation: warning-blink 0.8s infinite; display: none; }
        @keyframes warning-blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .update-active { background: rgba(0, 255, 65, 0.1); color: var(--accent-green); border-color: rgba(0, 255, 65, 0.3); }
        .update-outdated { background: rgba(255, 68, 68, 0.1); color: var(--accent-red); border-color: rgba(255, 68, 68, 0.3); }

        /* --- TICKER --- */
        .ticker-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background: var(--panel-bg);
            border-top: 2px solid var(--accent-blue);
            display: flex;
            align-items: center;
            z-index: 1001;
        }

        .ticker-head { 
            background: var(--accent-blue); 
            color: #000; 
            padding: 0 15px; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            font-weight: 900; 
            font-size: 0.7rem; 
            white-space: nowrap;
            font-family: 'Orbitron';
        }

        .ticker-body { 
            flex-grow: 1; 
            overflow: hidden; 
            position: relative; 
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ticker-scroll { 
            white-space: nowrap; 
            font-size: 1rem; 
            font-weight: 700; 
            color: var(--accent-green);
            font-family: 'Inter';
            letter-spacing: 1px;
            padding: 0 20px;
        }

        .scrolling-active {
            position: absolute;
            animation: ticker-move 30s linear infinite;
        }

        @keyframes ticker-move { 0% { transform: translateX(50%); } 100% { transform: translateX(-100%); } }

        /* --- STANDBY --- */
        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; }
        .analog-clock { width: 300px; height: 300px; border: 10px solid #222; border-radius: 50%; position: relative; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 4px; }
        .h-hr { width: 6px; height: 25%; background: #fff; }
        .h-min { width: 4px; height: 35%; background: #999; }
        .h-sec { width: 2px; height: 40%; background: var(--accent-red); }
    </style>
</head>
<body onclick="wakeUp()">

    <div id="blackout">
        <div class="analog-clock">
            <div id="ana-h" class="hand h-hr"></div>
            <div id="ana-m" class="hand h-min"></div>
            <div id="ana-s" class="hand h-sec"></div>
        </div>
    </div>

    <header class="top-bar">
        <div class="logo-section">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/74/Kochi_Metro_logo.png" alt="KMRL">
        </div>
        <div id="checklist-container" class="checklist-container" style="display: none;">
            <div id="checklist-text" class="checklist-marquee">CONNECTING TO KMRL DATA...</div>
        </div>
        <div id="clock-container" class="clock-container" style="display: none;">
            <div class="clock-unit"><div id="clk-h" class="clock-val">00</div><div class="clock-label">HRS</div></div>
            <div class="clock-unit"><div id="clk-m" class="clock-val">00</div><div class="clock-label">MIN</div></div>
            <div class="clock-unit"><div id="clk-s" class="clock-val">00</div><div class="clock-label">SEC</div></div>
        </div>
        <div class="top-controls">
            <button id="btn-grid" class="btn-control" onclick="toggleGrid(event)">GRID</button>
            <button class="btn-control" onclick="goFullscreen(event)">FS</button>
            <button class="btn-control btn-off" onclick="manualOff(event)">OFF</button>
        </div>
    </header>

    <main id="station-grid" class="station-grid" style="display: none;"></main>

    <section class="roster-section">
        <div class="roster-container">
            <div class="section-title">TODAY DEPLOYMENT</div>
            <div id="roster-today" class="shift-cards"></div>
        </div>
        <div class="roster-container">
            <div class="section-title">TOMORROW DEPLOYMENT</div>
            <div id="roster-tomorrow" class="shift-cards"></div>
        </div>
    </section>

    <section class="bottom-layout">
        <div class="maint-wrap">
            <div class="maint-title"><span id="maint-header-text">MAINTENANCE SCHEDULE</span></div>
            <div id="maint-list" class="maint-list"></div>
        </div>
        <div class="status-blocks">
            <div id="box-mainline" class="ops-static-box">MAINLINE: ---</div>
            <div id="box-depot" class="ops-static-box">DEPOT: ---</div>
            <div class="notice-board">
                <div class="notice-title">📢 IMPORTANT NOTICE</div>
                <div class="notice-content-wrapper" id="notice-wrapper">
                    <div id="notice-text-content" class="notice-content">Awaiting latest updates from control...</div>
                </div>
            </div>
            <div id="refresh-indicator" style="font-size: 0.6rem; color: var(--text-dim); text-align: center; margin-top: 5px;">LAST UPDATED: ---</div>
        </div>
    </section>

    <div id="driver-card" class="driver-overlay">
        <div id="outdated-warning" class="outdated-warning">OUTDATED</div>
        <img id="driver-img" src="https://cdn-icons-png.flaticon.com/256/15726/15726482.png" class="driver-img" onclick="initiateCall(event)">
        <div>
            <div id="driver-shift" style="font-size:0.6rem; background: var(--accent-orange); color: #000; padding: 1px 4px; border-radius: 3px; font-weight: 800; display: inline-block;">SHIFT: ---</div>
            <div id="driver-name" class="driver-name">Loading...</div>
            <div id="driver-phone" class="driver-phone">---</div>
            <div id="driver-update-badge" class="driver-update-badge update-outdated">UPDATE: ---</div>
        </div>
    </div>

    <footer class="ticker-bar">
        <div id="ticker-head" class="ticker-head">TECHTICKER</div>
        <div id="ticker-body" class="ticker-body">
            <div id="ticker-text" class="ticker-scroll">SYNCING DATA...</div>
        </div>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyddUSOQ5nUubR9VBLWgPRJKYrkONJ6LnGxJ6yztzQbPt4VwdNVmyN-7g-9NW8zpdK5xg/exec";
        
        let noticeScrollInterval = null;
        let noticeScrollPos = 0;

        function goFullscreen(e) { if(e) e.stopPropagation(); if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function manualOff(e) { if(e) e.stopPropagation(); document.getElementById('blackout').style.display = 'flex'; }
        function wakeUp() { document.getElementById('blackout').style.display = 'none'; }

        function initiateCall(e) {
            const phone = document.getElementById('driver-phone').innerText;
            if (phone && phone !== "---") window.location.href = `tel:${phone.replace(/\D/g, '')}`;
        }

        function toggleGrid(e) {
            const grid = document.getElementById('station-grid'), chk = document.getElementById('checklist-container'), clk = document.getElementById('clock-container'), btn = document.getElementById('btn-grid');
            const isHidden = grid.style.display === 'none';
            grid.style.display = isHidden ? 'grid' : 'none';
            chk.style.display = isHidden ? 'flex' : 'none';
            clk.style.display = isHidden ? 'flex' : 'none';
            btn.classList.toggle('btn-grid-active', isHidden);
        }

        function parseStaff(raw) {
            if(!raw) return '';
            return raw.split('\n').map(line => {
                if(line.includes('|')) {
                    const parts = line.split('|'), name = parts[0].trim(), duty = parts[1] ? parts[1].trim() : '', dCode = duty.toUpperCase();
                    let bCls = '';
                    if(dCode.includes('M TPC')) bCls = 'badge-tpc-m'; else if(dCode.includes('E TPC')) bCls = 'badge-tpc-e'; else if(dCode.includes('N TPC')) bCls = 'badge-tpc-n';
                    return `<div class="staff-entry"><span>${name}</span><span class="duty-badge ${bCls}">${duty}</span></div>`;
                }
                return `<div class="staff-entry"><span>${line}</span></div>`;
            }).join('');
        }

        function evaluateUpdateBadge(rawTimestamp) {
            const card = document.getElementById('driver-card'), badge = document.getElementById('driver-update-badge'), warning = document.getElementById('outdated-warning');
            if (!rawTimestamp || rawTimestamp === "---") { badge.innerText = "UPDATE: N/A"; badge.className = "driver-update-badge update-outdated"; card.classList.add('driver-card-outdated'); warning.style.display = 'block'; return; }
            try {
                const updateTime = new Date(rawTimestamp), now = new Date();
                badge.innerText = `LAST UPDATE: ${updateTime.toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false })}`;
                const currentHour = now.getHours();
                let shiftStart = new Date(now);
                if (currentHour >= 8 && currentHour < 20) shiftStart.setHours(8, 0, 0, 0);
                else { if (currentHour < 8) shiftStart.setDate(now.getDate() - 1); shiftStart.setHours(20, 0, 0, 0); }
                if (updateTime >= shiftStart) { badge.className = "driver-update-badge update-active"; card.classList.remove('driver-card-outdated'); warning.style.display = 'none'; }
                else { badge.className = "driver-update-badge update-outdated"; card.classList.add('driver-card-outdated'); warning.style.display = 'block'; }
            } catch (e) { badge.innerText = "UPDATE: ERR"; }
        }

        function updateTickerBar(badge, names) {
            const head = document.getElementById('ticker-head');
            const text = document.getElementById('ticker-text');
            const body = document.getElementById('ticker-body');
            head.innerText = badge.toUpperCase();
            text.innerText = names;
            requestAnimationFrame(() => {
                const textWidth = text.scrollWidth;
                const containerWidth = body.offsetWidth;
                if (textWidth > containerWidth - 40) {
                    text.classList.add('scrolling-active');
                    body.style.justifyContent = 'flex-start';
                } else {
                    text.classList.remove('scrolling-active');
                    body.style.justifyContent = 'center';
                }
            });
        }

        function startNoticeAutoScroll() {
            const wrapper = document.getElementById('notice-wrapper');
            const content = document.getElementById('notice-text-content');
            
            if (noticeScrollInterval) clearInterval(noticeScrollInterval);
            
            noticeScrollPos = 0;
            content.style.transform = `translateY(0)`;

            // Small delay to allow layout calculation
            setTimeout(() => {
                const diff = content.scrollHeight - wrapper.offsetHeight;
                
                if (diff > 0) {
                    let waitCounter = 0;
                    noticeScrollInterval = setInterval(() => {
                        // Pause at top for 3 seconds
                        if (noticeScrollPos === 0 && waitCounter < 30) {
                            waitCounter++;
                            return;
                        }

                        noticeScrollPos -= 0.5; // Scroll speed
                        
                        if (Math.abs(noticeScrollPos) >= diff + 20) {
                            // Pause at bottom for 3 seconds
                            if (waitCounter < 60) {
                                waitCounter++;
                                return;
                            }
                            // Reset
                            noticeScrollPos = 0;
                            waitCounter = 0;
                        }
                        
                        content.style.transform = `translateY(${noticeScrollPos}px)`;
                    }, 50);
                }
            }, 500);
        }

        window.draw = function(data) {
            document.getElementById('refresh-indicator').innerText = `LAST UPDATED: ${new Date().toLocaleTimeString()}`;
            let stHtml = '', tdHtml = '', tmHtml = '';
            
            data.forEach(item => {
                const unit = (item.Unit || "").trim(), param = (item.Parameter || "").trim(), val = (item.Value || "").trim();

                if (param === "sheetab_R2C2" && unit === "sheetab") {
                    const el = document.getElementById('notice-text-content');
                    if (el.innerText !== val) {
                        el.innerText = val;
                        startNoticeAutoScroll();
                    }
                }

                if (param === "TechTicker" || unit === "TechTicker") {
                    if (val.includes('|')) {
                        const pts = val.split('|');
                        updateTickerBar(pts[0], pts[1]);
                    } else {
                        updateTickerBar("TECHNICIANS", val);
                    }
                }

                if (param === "ChecklistStatus") {
                    const el = document.getElementById('checklist-text');
                    el.innerText = `CHECKLIST STATUS: ${val}`;
                    el.style.color = val.includes("FILLED") ? "var(--accent-green)" : "var(--accent-red)";
                }

                if (unit === "StationTemp") {
                    const parts = val.split("|"), amb = parseFloat(parts[0]) || 0, trfo = parseFloat(parts[1]) || 0, isAlarm = amb > 34 || trfo > 80;
                    stHtml += `<div class="station-card ${isAlarm ? 'card-alarm' : ''}"><span class="st-name">${param}</span><span class="st-date">${parts[2] || '--:--'}</span><div class="st-data-row"><span class="${amb > 34 ? 'temp-warn' : 'temp-safe'}">A:${parts[0]}°</span><span class="${trfo > 80 ? 'temp-warn' : 'temp-safe'}">T:${parts[1]}°</span></div></div>`;
                }

                if (unit === "Staff-Today") tdHtml += `<div class="shift-card ${item.Limit === 'ACTIVE' ? 'shift-active' : ''}"><span class="shift-label">${param}</span>${parseStaff(val)}</div>`;
                if (unit === "Staff-Tomorrow") tmHtml += `<div class="shift-card"><span class="shift-label">${param}</span>${parseStaff(val)}</div>`;
                
                if (unit === "OpsBlock") {
                    const parts = val.split('|'), m = parts[0] || '---', d = parts[1] || '---', mEl = document.getElementById('box-mainline'), dEl = document.getElementById('box-depot');
                    mEl.innerText = `MAINLINE: ${m}`; dEl.innerText = `DEPOT: ${d}`;
                    mEl.className = `ops-static-box ${val.includes('ENERGISED') ? 'alert' : 'ok'}`;
                    dEl.className = `ops-static-box ${val.includes('ENERGISED') ? 'alert' : 'ok'}`;
                }

                if (unit === "OpsSchedule") {
                    const lines = val.split('\n').filter(l => l.trim() !== "");
                    document.getElementById('maint-list').innerHTML = lines.map(l => `<div class="sch-item">${l}</div>`).join('');
                }

                if (unit === "DriverPopup" || unit === "Technician") {
                    const parts = val.split('|');
                    document.getElementById('driver-name').innerText = parts[0] || "---";
                    document.getElementById('driver-phone').innerText = parts[1] || "---";
                    document.getElementById('driver-shift').innerText = `SHIFT: ${parts[2] || '---'}`;
                    if(parts[3]) document.getElementById('driver-img').src = parts[3];
                }

                if (unit === "sheetab" && param === "sheetab_R2C1") evaluateUpdateBadge(val);
            });

            if (stHtml) document.getElementById('station-grid').innerHTML = stHtml;
            if (tdHtml) document.getElementById('roster-today').innerHTML = tdHtml;
            if (tmHtml) document.getElementById('roster-tomorrow').innerHTML = tmHtml;
        };

        function updateClocks() {
            const n = new Date();
            const s = n.getSeconds(), m = n.getMinutes(), h = n.getHours();
            document.getElementById('clk-h').innerText = String(h).padStart(2, '0');
            document.getElementById('clk-m').innerText = String(m).padStart(2, '0');
            document.getElementById('clk-s').innerText = String(s).padStart(2, '0');
            document.getElementById('ana-s').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            document.getElementById('ana-m').style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
            document.getElementById('ana-h').style.transform = `translateX(-50%) rotate(${h * 30 + m * 0.5}deg)`;
        }
        setInterval(updateClocks, 1000);

        function refreshData() {
            const old = document.getElementById('api-script');
            if(old) old.remove();
            const s = document.createElement('script');
            s.id = 'api-script';
            s.src = `${API_URL}?callback=draw&_t=${Date.now()}`;
            document.body.appendChild(s);
        }
        setInterval(refreshData, 15000);
        refreshData();
        updateClocks();
        
        window.onresize = () => {
            const text = document.getElementById('ticker-text');
            const val = text.innerText;
            const head = document.getElementById('ticker-head').innerText;
            updateTickerBar(head, val);
            startNoticeAutoScroll(); // Recalculate notice scroll on resize
        };
    </script>
</body>
</html>
